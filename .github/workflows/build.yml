name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android SDK & NDK Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libffi-dev libssl-dev unzip targetcli-shell git ninja-build cmake
        # Sets up environment variables pointing to standard Ubuntu GitHub Actions Android SDK paths
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

    - name: Extract Project Assets
      run: |
        if [ -f "assets.zip" ]; then
          echo "Found assets.zip. Extracting..."
          unzip -o assets.zip -d .
          echo "Extraction complete."
        else
          echo "Error: assets.zip not found!"
          exit 1
        fi

    - name: Compile Native Android PySide6 Wheels
      run: |
        python -m venv venv
        source venv/bin/activate
        python -m pip install --upgrade pip
        pip install PySide6 shiboken6 jinja2 pkginfo tqdm packaging setuptools wheel sh
        mkdir -p wheels
        
        # Clone the Qt cross-compilation tools repository matching Python 3.12 requirements
        git clone https://qt.io --depth 1
        pip install -r pyside-setup/tools/cross_compile_android/requirements.txt
        
        # Cross-compiles matching ARM64 binaries locally within the server sandbox
        python pyside-setup/tools/cross_compile_android/cross_compile.py \
          --ndk-path=$ANDROID_HOME/ndk/25.2.9519653 \
          --sdk-path=$ANDROID_HOME \
          --arch=aarch64 \
          --out-dir=./wheels

    - name: Run Android Build
      run: |
        source venv/bin/activate
        # Explicitly targets our custom compiled local platform packages to bypass validation errors
        pyside6-android-deploy --name="Mirai-Ko Hana" \
          --wheel-pyside=wheels/PySide6*android_aarch64.whl \
          --wheel-shiboken=wheels/shiboken6*android_aarch64.whl

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mirai-ko-hana-app
        path: |
          **/*.apk
