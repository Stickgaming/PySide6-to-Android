name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android SDK Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libffi-dev libssl-dev unzip

    - name: Extract Project Assets
      run: |
        if [ -f "assets.zip" ]; then
          echo "Found assets.zip. Extracting..."
          unzip -o assets.zip -d .
          echo "Extraction complete."
        else
          echo "Error: assets.zip not found!"
          exit 1
        fi

    - name: Install PySide6 and Download Android Wheels
      run: |
        python -m venv venv
        source venv/bin/activate
        python -m pip install --upgrade pip
        # Pins host tools to a version that matches the available Android binaries
        pip install PySide6==6.8.0.1 shiboken6==6.8.0.1 jinja2 pkginfo tqdm packaging
        mkdir -p wheels
        # Explicitly downloads matching version 6.8.0.1 cross-compilers directly from PyPI
        pip download --only-binary=:all: --no-deps --platform=android_aarch64 --python-version=3.11 --implementation=cp --abi=cp311 -d ./wheels PySide6==6.8.0.1 shiboken6==6.8.0.1

    - name: Run Android Build
      run: |
        source venv/bin/activate
        # Wildcards match the authentic filenames downloaded by pip
        pyside6-android-deploy --name="Mirai-Ko Hana" \
          --wheel-pyside=wheels/PySide6*.whl \
          --wheel-shiboken=wheels/shiboken6*.whl

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mirai-ko-hana-app
        path: |
          **/*.apk
