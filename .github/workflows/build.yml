name: Build Android APK
on: push
jobs:
  android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install Android Build Tools
      run: |
        pip install buildozer cython
        sudo apt update && sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake
    - name: Package App File
      run: |
        buildozer init
        sed -i 's/requirements = python3,kivy/requirements = python3,pyside6/g' buildozer.spec
        buildozer -v android debug
    - name: Export Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Finished-Mobile-APK
        path: bin/*.apk
