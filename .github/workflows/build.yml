name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android SDK & Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libffi-dev libssl-dev unzip curl build-essential

    - name: Setup Android NDK
      uses: android-actions/setup-android@v4
      with:
        ndk-version: '25.2.9519653'

    - name: Extract Project Assets
      run: |
        if [ -f "assets.zip" ]; then
          unzip -o assets.zip -d .
        else
          echo "Warning: assets.zip not found, continuing..."
        fi

    - name: Install PySide6 and Deployment Tools
      run: |
        python -m venv venv
        source venv/bin/activate
        python -m pip install --upgrade pip
        pip install PySide6==6.8.0.2 shiboken6==6.8.0.2 jinja2 pkginfo tqdm packaging

    - name: Run Android Build
      run: |
        source venv/bin/activate
        
        export QT_QPA_PLATFORM=offscreen
        export ANDROID_HOME=$ANDROID_HOME
        export ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653
        
        # Download the raw binaries directly using clean, un-redirected file mirrors
        mkdir -p local_wheels
        curl -f -L -o local_wheels/pyside6_target.whl "https://qt.io"
        curl -f -L -o local_wheels/shiboken6_target.whl "https://qt.io"

        cat << 'EOF' > my_app.spec
        [app]
        title = Mirai-Ko Hana
        project_dir = .
        entrypoint = main.py
        architecture = arm64-v8a

        [python]
        version = 3.11
        requirements = PySide6,shiboken6,jinja2,pkginfo,tqdm,packaging
        android_packages = PySide6,shiboken6

        [android]
        wheel_pyside = local_wheels/pyside6_target.whl
        wheel_shiboken = local_wheels/shiboken6_target.whl
        android_packages = PySide6,shiboken6
        EOF

        pyside6-android-deploy -c my_app.spec --ndk-path=$ANDROID_NDK_ROOT --sdk-path=$ANDROID_HOME

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mirai-ko-hana-app
        path: |
          **/*.apk
