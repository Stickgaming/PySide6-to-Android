name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android SDK Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libffi-dev libssl-dev unzip

    - name: Extract Project Assets
      run: |
        if [ -f "assets.zip" ]; then
          echo "Found assets.zip. Extracting..."
          unzip -o assets.zip -d .
          echo "Extraction complete."
        else
          echo "Error: assets.zip not found!"
          exit 1
        fi

    - name: Install PySide6 and Download Android Wheels
      run: |
        python -m venv venv
        source venv/bin/activate
        python -m pip install --upgrade pip
        pip install PySide6==6.8.2 shiboken6==6.8.2 jinja2 pkginfo tqdm packaging requests
        mkdir -p wheels
        
        # Uses Python's native requests library to fetch the official Qt wheels reliably, ensuring they aren't corrupted
        python -c "
        import requests
        print('Downloading PySide6 wheel...')
        r1 = requests.get('https://qt.io')
        with open('wheels/pyside6_android_aarch64.whl', 'wb') as f: f.write(r1.content)
        print('Downloading Shiboken6 wheel...')
        r2 = requests.get('https://qt.io')
        with open('wheels/shiboken6_android_aarch64.whl', 'wb') as f: f.write(r2.content)
        print('Downloads complete!')
        "

    - name: Run Android Build
      run: |
        source venv/bin/activate
        
        # Generates the required specification config layout file
        cat << 'EOF' > pysidedeploy.spec
        [app]
        title = Mirai-Ko Hana
        project_dir = .
        entrypoint = main.py
        architecture = arm64-v8a

        [python]
        version = 3.11.5
        requirements = PySide6,shiboken6,jinja2,pkginfo,tqdm,packaging

        [android]
        wheel_pyside = wheels/pyside6_android_aarch64.whl
        wheel_shiboken = wheels/shiboken6_android_aarch64.whl
        EOF

        # Executes the builder directly targeting our manual spec structure
        pyside6-android-deploy --config=pysidedeploy.spec
