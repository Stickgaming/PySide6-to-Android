name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android SDK & Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libffi-dev libssl-dev unzip curl build-essential

    - name: Setup Android NDK
      uses: android-actions/setup-android@v4
      with:
        ndk-version: '25.2.9519653'

    - name: Isolate Application Workspace
      run: |
        # Build an isolated folder structure to ensure your repository venv folder is completely hidden from the compiler
        mkdir -p build_dir/local_wheels
        cp main.py build_dir/
        cp hana_persona.py build_dir/
        cp hana2_persona.py build_dir/
        cp mirai_ko_girls.py build_dir/
        cp mirai_logo.ico build_dir/
        cp pysidedeploy.spec build_dir/
        
        if [ -f "assets.zip" ]; then
          cp assets.zip build_dir/
          cd build_dir && unzip -o assets.zip -d . && rm assets.zip && cd ..
        fi

    - name: Download Authentic Wheels From GitHub Release Assets
      uses: robinraju/release-downloader@v1.11
      with:
        repository: "Stickgaming/PySide6-to-Android"
        tag: "v1.0.0"
        fileName: "*.whl"
        out-file-path: "build_dir/local_wheels"

    - name: Verify Wheel Integrity on Local Disk
      run: |
        # Quick validation to make sure they are genuine zip binaries on disk before launching the deployer
        ls -la build_dir/local_wheels/
        file build_dir/local_wheels/*.whl

    - name: Install PySide6 and Deployment Tools
      run: |
        python -m venv runner_env
        source runner_env/bin/activate
        python -m pip install --upgrade pip
        pip install PySide6==6.8.0.2 shiboken6==6.8.0.2 jinja2 pkginfo tqdm packaging

    - name: Run Android Build
      run: |
        source runner_env/bin/activate
        
        export QT_QPA_PLATFORM=offscreen
        export ANDROID_HOME=$ANDROID_HOME
        export ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653

        # Shift execution cleanly into the workspace folder and compile locally
        cd build_dir
        pyside6-android-deploy -c pysidedeploy.spec --ndk-path=$ANDROID_NDK_ROOT --sdk-path=$ANDROID_HOME

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mirai-ko-hana-app
        path: |
          build_dir/**/*.apk
