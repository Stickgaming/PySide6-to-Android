name: Build Android APK
on: push
jobs:
  android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Install Android SDK Engine
      uses: android-actions/setup-android@v3
      
    - name: Install Qt Deployment Tools
      run: |
        pip install "pyside6>=6.6.0" shiboken6
        
    - name: Package App File
      run: |
        pyside6-android-deploy --source-dir . --main-script main.py --target-architecture arm64-v8a --keep-deployment-files
        
    - name: Export Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Finished-Mobile-APK
        path: "./**/*.apk"
