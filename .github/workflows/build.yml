name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android SDK Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libffi-dev libssl-dev unzip

    - name: Extract Project Assets
      run: |
        if [ -f "assets.zip" ]; then
          echo "Found assets.zip. Extracting..."
          unzip -o assets.zip -d .
          echo "Extraction complete."
        else
          echo "Error: assets.zip not found!"
          exit 1
        fi

    - name: Install PySide6 and Deployment Tools
      run: |
        python -m venv venv
        source venv/bin/activate
        python -m pip install --upgrade pip
        pip install PySide6==6.8.2 shiboken6==6.8.2 jinja2 pkginfo tqdm packaging

    - name: Run Android Build
      run: |
        source venv/bin/activate
        
        # Uses the tool's built-in initializer script to auto-generate standard dependencies
        pyside6-android-deploy --init --name="Mirai-Ko Hana"
