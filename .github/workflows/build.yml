name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android SDK & Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libffi-dev libssl-dev unzip curl build-essential

    - name: Setup Android NDK
      uses: android-actions/setup-android@v4
      with:
        ndk-version: '25.2.9519653'

    - name: Extract Project Assets
      run: |
        if [ -f "assets.zip" ]; then
          unzip -o assets.zip -d .
        else
          echo "Warning: assets.zip not found, continuing..."
        fi

    - name: Prepare Python Environment & Fetch Android Wheels
      run: |
        # 1. Create and initialize the environment safely
        python -m venv venv
        source venv/bin/activate
        python -m pip install --upgrade pip
        pip install PySide6==6.8.0 shiboken6==6.8.0 jinja2 pkginfo tqdm packaging

        # 2. Download genuine, complete binaries using pip instead of raw curl/wget
        mkdir -p wheels
        pip download --only-binary=:all: --dest wheels --index-url https://pypi.org --extra-index-url https://qt.io PySide6 shiboken6
        
        # 3. Rename downloaded archives safely to clear the configuration parser matches
        mv wheels/PySide6-*android_aarch64*.whl wheels/pyside6_android_aarch64.whl
        mv wheels/shiboken6-*android_aarch64*.whl wheels/shiboken6_android_aarch64.whl

    - name: Run Android Build
      run: |
        source venv/bin/activate
        
        export ANDROID_HOME=$ANDROID_HOME
        export ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653
        
        cat << 'EOF' > my_app.spec
        [app]
        title = Mirai-Ko Hana
        project_dir = .
        entrypoint = main.py
        architecture = arm64-v8a

        [python]
        version = 3.11
        requirements = PySide6==6.8.0,shiboken6==6.8.0,jinja2,pkginfo,tqdm,packaging
        android_packages = PySide6,shiboken6

        [android]
        wheel_pyside = wheels/pyside6_android_aarch64.whl
        wheel_shiboken = wheels/shiboken6_android_aarch64.whl
        android_packages = PySide6,shiboken6
        EOF

        pyside6-android-deploy -c my_app.spec --ndk-path=$ANDROID_NDK_ROOT --sdk-path=$ANDROID_HOME

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mirai-ko-hana-app
        path: |
          **/*.apk
