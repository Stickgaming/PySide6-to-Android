name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android SDK & Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libffi-dev libssl-dev unzip curl build-essential

    - name: Setup Android NDK
      uses: android-actions/setup-android@v4
      with:
        ndk-version: '25.2.9519653'

    - name: Isolate Application Workspace
      run: |
        # Isolate code files cleanly away from the repo-level venv folder
        mkdir -p build_dir/local_wheels
        cp main.py build_dir/
        cp hana_persona.py build_dir/
        cp hana2_persona.py build_dir/
        cp mirai_ko_girls.py build_dir/
        cp mirai_logo.ico build_dir/
        cp pysidedeploy.spec build_dir/
        
        if [ -f "assets.zip" ]; then
          cp assets.zip build_dir/
          cd build_dir && unzip -o assets.zip -d . && rm assets.zip && cd ..
        fi

    - name: Build Genuine Mobile Wheels Natively
      run: |
        # Initialize a fresh host environment
        python -m venv host_env
        source host_env/bin/activate
        python -m pip install --upgrade pip
        pip install crossenv PySide6==6.8.0.2 shiboken6==6.8.0.2 jinja2 pkginfo tqdm packaging

        export ANDROID_HOME=$ANDROID_HOME
        export ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653

        # Create the missing base venv directory structure first so crossenv doesn't fail
        python -m venv base_venv

        # Configure crossenv to build real, uncorrupted arm64-v8a wheels locally on the disk
        python -m crossenv base_venv --platform android_aarch64 host_env/bin/python cross_env
        source cross_env/bin/activate
        
        # Build pristine target binaries directly into our isolated workspace wheels path
        pip wheel --wheel-dir=build_dir/local_wheels PySide6==6.8.0.2 shiboken6==6.8.0.2

    - name: Run Android Build
      run: |
        source host_env/bin/activate
        
        export QT_QPA_PLATFORM=offscreen
        export ANDROID_HOME=$ANDROID_HOME
        export ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653

        # Navigate into the isolated workspace directory and compile natively
        cd build_dir
        
        # Dynamically normalize file mapping strings to clear your spec file expectations perfectly
        mv local_wheels/PySide6-*.whl local_wheels/pyside6_android_aarch64.whl
        mv local_wheels/shiboken6-*.whl local_wheels/shiboken6_android_aarch64.whl
        
        pyside6-android-deploy -c pysidedeploy.spec --ndk-path=$ANDROID_NDK_ROOT --sdk-path=$ANDROID_HOME

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mirai-ko-hana-app
        path: |
          build_dir/**/*.apk
