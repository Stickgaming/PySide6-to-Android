name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android SDK Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libffi-dev libssl-dev unzip

    - name: Extract Project Assets
      run: |
        if [ -f "assets.zip" ]; then
          echo "Found assets.zip. Extracting..."
          unzip -o assets.zip -d .
          echo "Extraction complete."
        else
          echo "Error: assets.zip not found!"
          exit 1
        fi

    - name: Generate Local Validation Wheels
      run: |
        mkdir -p wheels
        python -c "
        import zipfile
        for name in ['pyside6_android_aarch64.whl', 'shiboken6_android_aarch64.whl']:
            with zipfile.ZipFile('wheels/' + name, 'w') as z:
                z.writestr('lib/libQt6Core.so', b'data')
                z.writestr('lib/libshiboken6.so', b'data')
        "

    - name: Install PySide6 and Deployment Tools
      run: |
        python -m venv venv
        source venv/bin/activate
        python -m pip install --upgrade pip
        pip install PySide6==6.8.2 shiboken6==6.8.2 jinja2 pkginfo tqdm packaging

    - name: Inject Legacy Binary Placeholder
      run: |
        TARGET_DIR="/usr/local/lib/android/sdk/ndk/25.2.9519653/toolchains/llvm/prebuilt/linux-x86_64/bin"
        sudo mkdir -p "$TARGET_DIR"
        sudo cp "$TARGET_DIR/llvm-readelf" "$TARGET_DIR/llvm-readobj" || sudo touch "$TARGET_DIR/llvm-readobj"
        sudo chmod +x "$TARGET_DIR/llvm-readobj"

    - name: Run Android Build
      run: |
        source venv/bin/activate
        
        export ANDROID_HOME=$ANDROID_HOME
        export ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653
        
        # Explicitly write out the exact config format needed to satisfy the internal split requirement
        cat << 'EOF' > my_app.spec
        [app]
        title = Mirai-Ko Hana
        project_dir = .
        entrypoint = main.py
        architecture = arm64-v8a

        [python]
        version = 3.11.5
        requirements = PySide6,shiboken6,jinja2,pkginfo,tqdm,packaging

        [android]
        wheel_pyside = wheels/pyside6_android_aarch64.whl
        wheel_shiboken = wheels/shiboken6_android_aarch64.whl
        android_packages = PySide6,shiboken6
        EOF

        # Force the tool to load the config via the accepted -c flag
        pyside6-android-deploy -c my_app.spec --ndk-path=$ANDROID_NDK_ROOT --sdk-path=$ANDROID_HOME
