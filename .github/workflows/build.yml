name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android SDK Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libffi-dev libssl-dev unzip

    - name: Extract Project Assets
      run: |
        if [ -f "assets.zip" ]; then
          echo "Found assets.zip. Extracting..."
          unzip -o assets.zip -d .
          echo "Extraction complete."
        else
          echo "Error: assets.zip not found!"
          exit 1
        fi

    - name: Fetch Real Android Wheels via Python Script
      run: |
        mkdir -p wheels
        python -c "
        import urllib.request
        headers = {'User-Agent': 'Mozilla/5.0'}
        
        print('Streaming valid PySide6 Android wheel...')
        req1 = urllib.request.Request('https://pythonhosted.org', headers=headers)
        with urllib.request.urlopen(req1) as response, open('wheels/pyside6_android_aarch64.whl', 'wb') as out_file:
            out_file.write(response.read())
            
        print('Streaming valid Shiboken6 Android wheel...')
        req2 = urllib.request.Request('https://pythonhosted.org', headers=headers)
        with urllib.request.urlopen(req2) as response, open('wheels/shiboken6_android_aarch64.whl', 'wb') as out_file:
            out_file.write(response.read())
        print('Success!')
        "

    - name: Install PySide6 and Deployment Tools
      run: |
        python -m venv venv
        source venv/bin/activate
        python -m pip install --upgrade pip
        pip install PySide6==6.8.0.1 shiboken6==6.8.0.1 jinja2 pkginfo tqdm packaging

    - name: Run Android Build
      run: |
        source venv/bin/activate
        
        export ANDROID_HOME=$ANDROID_HOME
        export ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653
        
        # Removed the broken entry point flag so it can initialize cleanly
        pyside6-android-deploy --name="Mirai-Ko Hana" \
          --sdk-path=$ANDROID_HOME \
          --ndk-path=$ANDROID_NDK_ROOT \
          --wheel-pyside=wheels/pyside6_android_aarch64.whl \
          --wheel-shiboken=wheels/shiboken6_android_aarch64.whl

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mirai-ko-hana-app
        path: |
          **/*.apk
