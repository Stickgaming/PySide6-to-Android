name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android SDK & Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libffi-dev libssl-dev unzip curl build-essential

    - name: Setup Android NDK
      uses: android-actions/setup-android@v4
      with:
        ndk-version: '25.2.9519653'

    - name: Isolate Application Workspace
      run: |
        # Create a clean, isolated directory to completely hide the repository's venv folder from the compiler
        mkdir build_dir
        cp main.py build_dir/
        cp hana_persona.py build_dir/
        cp hana2_persona.py build_dir/
        cp mirai_ko_girls.py build_dir/
        cp mirai_logo.ico build_dir/
        cp pysidedeploy.spec build_dir/
        
        if [ -f "assets.zip" ]; then
          cp assets.zip build_dir/
          cd build_dir && unzip -o assets.zip -d . && rm assets.zip && cd ..
        fi

    - name: Install PySide6 and Deployment Tools
      run: |
        # Use a fresh runner-level environment entirely separate from the repo path
        python -m venv runner_env
        source runner_env/bin/activate
        python -m pip install --upgrade pip
        pip install PySide6==6.8.0.2 shiboken6==6.8.0.2 jinja2 pkginfo tqdm packaging

    - name: Run Android Build
      run: |
        source runner_env/bin/activate
        
        export QT_QPA_PLATFORM=offscreen
        export ANDROID_HOME=$ANDROID_HOME
        export ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653

        # Create the exact folder expected by your spec file
        mkdir -p build_dir/local_wheels

        # Download the precise 6.8.0.2 filenames that your pysidedeploy.spec is looking for
        curl -L -o build_dir/local_wheels/PySide6-6.8.0.2-6.8.0-cp311-cp311-android_aarch64.whl "https://qt.io"
        curl -L -o build_dir/local_wheels/shiboken6-6.8.0.2-6.8.0-cp311-cp311-android_aarch64.whl "https://qt.io"

        # Change directory into the isolated space and compile safely
        cd build_dir
        pyside6-android-deploy -c pysidedeploy.spec --ndk-path=$ANDROID_NDK_ROOT --sdk-path=$ANDROID_HOME

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mirai-ko-hana-app
        path: |
          build_dir/**/*.apk
