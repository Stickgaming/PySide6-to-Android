name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android SDK & Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libffi-dev libssl-dev unzip curl build-essential

    - name: Setup Android NDK
      uses: android-actions/setup-android@v4
      with:
        ndk-version: '25.2.9519653'

    - name: Extract Project Assets
      run: |
        if [ -f "assets.zip" ]; then
          unzip -o assets.zip -d .
        else
          echo "Warning: assets.zip not found, continuing..."
        fi

    - name: Install PySide6 and Deployment Tools
      run: |
        python -m venv venv
        source venv/bin/activate
        python -m pip install --upgrade pip
        pip install PySide6==6.8.0.2 shiboken6==6.8.0.2 jinja2 pkginfo tqdm packaging

    - name: Run Android Build
      run: |
        source venv/bin/activate
        
        export QT_QPA_PLATFORM=offscreen
        export ANDROID_HOME=$ANDROID_HOME
        export ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653
        
        # Download the genuine binary zip archives right into the folder path expected by your spec file
        mkdir -p local_wheels
        curl -L -o local_wheels/PySide6-6.8.0-1-cp311-cp311-android_aarch64.whl "https://github.com"
        curl -L -o local_wheels/shiboken6-6.8.0-1-cp311-cp311-android_aarch64.whl "https://github.com"

        # Explicitly pass the clean repository configuration file natively
        pyside6-android-deploy -c pysidedeploy.spec --ndk-path=$ANDROID_NDK_ROOT --sdk-path=$ANDROID_HOME

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mirai-ko-hana-app
        path: |
          **/*.apk
