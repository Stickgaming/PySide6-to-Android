name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android SDK Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libffi-dev libssl-dev unzip

    - name: Extract Project Assets
      run: |
        if [ -f "assets.zip" ]; then
          echo "Found assets.zip. Extracting..."
          unzip -o assets.zip -d .
          echo "Extraction complete."
        else
          echo "Error: assets.zip not found!"
          exit 1
        fi

    - name: Install PySide6 and Download Target Wheels
      run: |
        python -m venv venv
        source venv/bin/activate
        python -m pip install --upgrade pip
        pip install PySide6 shiboken6 jinja2 pkginfo tqdm packaging
        mkdir -p wheels
        
        # Directly downloads authentic, verified 6.8.2 wheel binaries from the public repository
        curl -L -o wheels/shiboken6_android_aarch64.whl https://github.com
        curl -L -o wheels/pyside6_android_aarch64.whl https://github.com

    - name: Run Android Build
      run: |
        source venv/bin/activate
        # Explicit command-line arguments to bypass configuration file lookup errors
        pyside6-android-deploy --name="Mirai-Ko Hana" \
          --wheel-pyside=wheels/pyside6_android_aarch64.whl \
          --wheel-shiboken=wheels/shiboken6_android_aarch64.whl

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mirai-ko-hana-app
        path: |
          **/*.apk
